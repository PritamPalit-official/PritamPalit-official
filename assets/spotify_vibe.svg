<svg viewBox="0 0 800 130" xmlns="http://www.w3.org/2000/svg">
  <style>
    .card-bg {
      fill: #090d16;
      stroke: #1f2937;
      stroke-width: 1.5;
      rx: 12px;
    }
    .track-title {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-weight: 800;
      font-size: 16px;
      fill: #ffffff;
    }
    .artist {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-weight: 500;
      font-size: 13px;
      fill: #1db954;
      letter-spacing: 0.5px;
    }
    .playlist {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-weight: 400;
      font-size: 11px;
      fill: #9ca3af;
    }
    .time {
      font-family: monospace;
      font-size: 11px;
      fill: #6b7280;
    }
    .icon {
      fill: #9ca3af;
      cursor: pointer;
    }
    .icon:hover {
      fill: #1db954;
    }
    .playing-bar {
      fill: #1db954;
    }
    .empty-bar {
      fill: #374151;
      rx: 3px;
    }
    .glow {
      filter: drop-shadow(0px 0px 8px rgba(29, 185, 84, 0.4));
    }
    @keyframes equalize {
      0% { height: 4px; y: 63px; }
      50% { height: 18px; y: 49px; }
      100% { height: 4px; y: 63px; }
    }
    .bar {
      fill: #1db954;
      width: 3px;
      animation: equalize 1.2s ease-in-out infinite;
    }
    .bar-1 { animation-delay: 0.1s; }
    .bar-2 { animation-delay: 0.4s; }
    .bar-3 { animation-delay: 0.2s; }
    .bar-4 { animation-delay: 0.6s; }
  </style>

  <!-- Card Body -->
  <rect width="800" height="130" class="card-bg" />

  <!-- Album Art with spinning vinyl disk -->
  <g transform="translate(25, 20)">
    <!-- Outer sleeve jacket -->
    <rect width="90" height="90" rx="8" fill="#181818" stroke="#282828" stroke-width="1" />
    
    <!-- Spinning Vinyl record -->
    <g>
      <circle cx="45" cy="45" r="41" fill="#0d1117" stroke="#1c1c1c" stroke-width="1.5" />
      <circle cx="45" cy="45" r="38" fill="none" stroke="#21262d" stroke-dasharray="6, 4" stroke-width="0.8" />
      <circle cx="45" cy="45" r="32" fill="none" stroke="#30363d" stroke-dasharray="4, 2" stroke-width="0.8" />
      <circle cx="45" cy="45" r="26" fill="none" stroke="#21262d" stroke-dasharray="8, 3" stroke-width="0.6" />
      <!-- Center record label -->
      <circle cx="45" cy="45" r="16" fill="url(#album-grad)" />
      <!-- Center code logo -->
      <text x="45" y="49" font-family="monospace" font-weight="900" font-size="12" fill="#ffffff" text-anchor="middle">&lt;/&gt;</text>
      <!-- Spindle hole -->
      <circle cx="45" cy="45" r="3" fill="#0d1117" />
      <animateTransform attributeName="transform" type="rotate" from="0 45 45" to="360 45 45" dur="8s" repeatCount="indefinite" />
    </g>
  </g>

  <!-- Gradients -->
  <defs>
    <linearGradient id="album-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1db954" />
      <stop offset="100%" stop-color="#090d16" />
    </linearGradient>
  </defs>

  <!-- Equalizer Animation Bars -->
  <g transform="translate(130, 0)">
    <rect class="bar bar-1" x="0" y="55" width="3" height="12" rx="1.5" />
    <rect class="bar bar-2" x="6" y="55" width="3" height="12" rx="1.5" />
    <rect class="bar bar-3" x="12" y="55" width="3" height="12" rx="1.5" />
    <rect class="bar bar-4" x="18" y="55" width="3" height="12" rx="1.5" />
  </g>

  <!-- Song Information -->
  <text x="165" y="48" class="track-title">Lo-Fi Coding Session ☕</text>
  <text x="165" y="68" class="artist">Pritam Palit <tspan fill="#6b7280" font-weight="normal">• Vibe Coding</tspan></text>
  <text x="165" y="88" class="playlist">Playing from playlist: "Late Night Deep Focus" 🎧</text>

  <!-- Animated Floating Music Notes -->
  <g font-family="sans-serif" font-size="14" fill="#1db954" opacity="0">
    <text x="120" y="40">🎵
      <animate attributeName="y" from="40" to="15" dur="4s" begin="0s" repeatCount="indefinite" />
      <animate attributeName="x" from="120" to="140" dur="4s" begin="0s" repeatCount="indefinite" />
      <animate attributeName="opacity" values="0; 0.8; 0" keyTimes="0; 0.3; 1" dur="4s" begin="0s" repeatCount="indefinite" />
    </text>
    <text x="125" y="60">🎶
      <animate attributeName="y" from="60" to="30" dur="4s" begin="2s" repeatCount="indefinite" />
      <animate attributeName="x" from="125" to="150" dur="4s" begin="2s" repeatCount="indefinite" />
      <animate attributeName="opacity" values="0; 0.8; 0" keyTimes="0; 0.3; 1" dur="4s" begin="2s" repeatCount="indefinite" />
    </text>
  </g>

  <!-- Playback Control Icons -->
  <g transform="translate(560, 30)">
    <!-- Shuffle -->
    <path class="icon" d="M 0 5 L 4 1 L 4 9 Z" transform="translate(5, 5)" />
    <path class="icon" d="M 0 15 L 4 11 L 4 19 Z" transform="translate(5, 5)" />
    <!-- Previous -->
    <g transform="translate(30, 5)">
      <polygon points="10,0 10,16 0,8" class="icon" />
      <rect x="0" y="0" width="2" height="16" class="icon" />
    </g>
    <!-- Play/Pause Circle -->
    <g transform="translate(60, -7)">
      <circle cx="20" cy="20" r="20" fill="#1db954" class="glow" />
      <rect x="14" y="12" width="4" height="16" fill="#ffffff" rx="1" />
      <rect x="22" y="12" width="4" height="16" fill="#ffffff" rx="1" />
    </g>
    <!-- Next -->
    <g transform="translate(110, 5)">
      <polygon points="0,0 0,16 10,8" class="icon" />
      <rect x="10" y="0" width="2" height="16" class="icon" />
    </g>
    <!-- Repeat -->
    <path class="icon" d="M 140 13 A 6 6 0 1 1 152 13 L 149 13 A 3 3 0 1 0 140 10" transform="translate(0, 2)" />
  </g>

  <!-- Progress Bar -->
  <g transform="translate(165, 105)">
    <text x="0" y="5" class="time">02:45</text>
    <rect x="45" y="-3" width="520" height="6" class="empty-bar" />
    <rect x="45" y="-3" width="370" height="6" rx="3" class="playing-bar glow" />
    <circle cx="415" cy="0" r="5" fill="#ffffff" class="glow" />
    <text x="580" y="5" class="time">03:50</text>
  </g>

  <!-- Stripe-Style Reflection Sweep -->
  <defs>
    <linearGradient id="spotify-sweep" x1="0%" y1="0%" x2="30%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0" />
      <stop offset="30%" stop-color="#ffffff" stop-opacity="0" />
      <stop offset="50%" stop-color="#ffffff" stop-opacity="0.08" />
      <stop offset="70%" stop-color="#ffffff" stop-opacity="0" />
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0" />
    </linearGradient>
  </defs>
  <rect width="800" height="130" fill="url(#spotify-sweep)" pointer-events="none" rx="12">
    <animate attributeName="x" from="-800" to="800" dur="7s" repeatCount="indefinite" />
  </rect>
</svg>
