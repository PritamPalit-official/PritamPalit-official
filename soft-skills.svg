<svg viewBox="0 0 800 120" xmlns="http://www.w3.org/2000/svg">
  <style>
    .card-group {
      cursor: pointer;
      transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1);
    }
    .card-glow {
      transition: opacity 0.3s ease;
      opacity: 0;
    }
    .card-main {
      transition: stroke 0.3s ease, fill 0.3s ease;
    }
    .card-group:hover {
      transform: translateY(-6px);
    }
    .card-group:hover .card-glow {
      opacity: 0.65;
    }
    .card-title {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      font-weight: 800;
      font-size: 13px;
      fill: #ffffff;
    }
    .card-desc {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      font-weight: 500;
      font-size: 9px;
      fill: #8b949e;
    }
    .card-icon {
      font-size: 20px;
    }
    
    .card-group.card-adaptiveness:hover .card-main { stroke: #2ECC71; }
    .card-group.card-strategy:hover .card-main { stroke: #00F0FF; }
    .card-group.card-analytical:hover .card-main { stroke: #9B59B6; }
    .card-group.card-communication:hover .card-main { stroke: #F39C12; }
    .card-group.card-problem:hover .card-main { stroke: #E74C3C; }

    .card-adaptiveness { transform-origin: 90px 57.5px; }
    .card-strategy { transform-origin: 245px 57.5px; }
    .card-analytical { transform-origin: 400px 57.5px; }
    .card-communication { transform-origin: 555px 57.5px; }
    .card-problem { transform-origin: 710px 57.5px; }

    /* CSS drop-shadow instead of SVG filter elements */
    .glow-adaptiveness { filter: drop-shadow(0px 0px 8px #2ECC71); }
    .glow-strategy { filter: drop-shadow(0px 0px 8px #00F0FF); }
    .glow-analytical { filter: drop-shadow(0px 0px 8px #9B59B6); }
    .glow-communication { filter: drop-shadow(0px 0px 8px #F39C12); }
    .glow-problem { filter: drop-shadow(0px 0px 8px #E74C3C); }
  </style>

  <g class="card-group card-adaptiveness">
    <!-- Glow layer -->
    <rect x="22.5" y="20" width="135" height="75" rx="10" ry="10" fill="#2ECC71" class="card-glow glow-adaptiveness" />
    <!-- Card Body -->
    <rect x="22.5" y="20" width="135" height="75" rx="10" ry="10" fill="#0d1117" stroke="#30363d" stroke-width="1.5" class="card-main" />
    <!-- Icon -->
    <text x="37.5" y="55" class="card-icon">⚡</text>
    <!-- Title -->
    <text x="37.5" y="72" class="card-title">Adaptiveness</text>
    <!-- Description -->
    <text x="37.5" y="84" class="card-desc">Quick learner &amp; resilient</text>
  </g>
  <g class="card-group card-strategy">
    <!-- Glow layer -->
    <rect x="177.5" y="20" width="135" height="75" rx="10" ry="10" fill="#00F0FF" class="card-glow glow-strategy" />
    <!-- Card Body -->
    <rect x="177.5" y="20" width="135" height="75" rx="10" ry="10" fill="#0d1117" stroke="#30363d" stroke-width="1.5" class="card-main" />
    <!-- Icon -->
    <text x="192.5" y="55" class="card-icon">📈</text>
    <!-- Title -->
    <text x="192.5" y="72" class="card-title">Data Strategy</text>
    <!-- Description -->
    <text x="192.5" y="84" class="card-desc">Business value alignment</text>
  </g>
  <g class="card-group card-analytical">
    <!-- Glow layer -->
    <rect x="332.5" y="20" width="135" height="75" rx="10" ry="10" fill="#9B59B6" class="card-glow glow-analytical" />
    <!-- Card Body -->
    <rect x="332.5" y="20" width="135" height="75" rx="10" ry="10" fill="#0d1117" stroke="#30363d" stroke-width="1.5" class="card-main" />
    <!-- Icon -->
    <text x="347.5" y="55" class="card-icon">🧠</text>
    <!-- Title -->
    <text x="347.5" y="72" class="card-title">Analytical</text>
    <!-- Description -->
    <text x="347.5" y="84" class="card-desc">Root cause data extraction</text>
  </g>
  <g class="card-group card-communication">
    <!-- Glow layer -->
    <rect x="487.5" y="20" width="135" height="75" rx="10" ry="10" fill="#F39C12" class="card-glow glow-communication" />
    <!-- Card Body -->
    <rect x="487.5" y="20" width="135" height="75" rx="10" ry="10" fill="#0d1117" stroke="#30363d" stroke-width="1.5" class="card-main" />
    <!-- Icon -->
    <text x="502.5" y="55" class="card-icon">💬</text>
    <!-- Title -->
    <text x="502.5" y="72" class="card-title">Communication</text>
    <!-- Description -->
    <text x="502.5" y="84" class="card-desc">Clear team collaboration</text>
  </g>
  <g class="card-group card-problem">
    <!-- Glow layer -->
    <rect x="642.5" y="20" width="135" height="75" rx="10" ry="10" fill="#E74C3C" class="card-glow glow-problem" />
    <!-- Card Body -->
    <rect x="642.5" y="20" width="135" height="75" rx="10" ry="10" fill="#0d1117" stroke="#30363d" stroke-width="1.5" class="card-main" />
    <!-- Icon -->
    <text x="657.5" y="55" class="card-icon">🔍</text>
    <!-- Title -->
    <text x="657.5" y="72" class="card-title">Problem Solving</text>
    <!-- Description -->
    <text x="657.5" y="84" class="card-desc">Analytical debug mindset</text>
  </g>
</svg>