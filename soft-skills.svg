<svg viewBox="0 0 800 120" xmlns="http://www.w3.org/2000/svg">
  <style>
    .card-group {
      cursor: pointer;
      transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1);
    }
    .card-glow {
      transition: opacity 0.3s ease;
      opacity: 0;
    }
    .card-main {
      transition: stroke 0.3s ease, fill 0.3s ease;
    }
    .card-group:hover {
      transform: translateY(-6px);
    }
    .card-group:hover .card-glow {
      opacity: 0.65;
    }
    .card-title {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      font-weight: 800;
      font-size: 13px;
      fill: #ffffff;
    }
    .card-desc {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      font-weight: 500;
      font-size: 9px;
      fill: #8b949e;
    }
    .card-icon {
      font-size: 20px;
    }
  </style>

  <defs>
    <filter id="soft-blur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
    </filter>
  </defs>

  <g class="card-group" style="transform-origin: 90.0px 57.5px;">
    <!-- Glow layer -->
    <rect x="22.5" y="20" width="135" height="75" rx="10" ry="10" fill="#2ECC71" filter="url(#soft-blur)" class="card-glow" />
    <!-- Card Body -->
    <rect x="22.5" y="20" width="135" height="75" rx="10" ry="10" fill="#0d1117" stroke="#30363d" stroke-width="1.5" class="card-main" style="stroke-hover: #2ECC71;" />
    <!-- Icon -->
    <text x="37.5" y="55" class="card-icon">⚡</text>
    <!-- Title -->
    <text x="37.5" y="72" class="card-title">Adaptiveness</text>
    <!-- Description -->
    <text x="37.5" y="84" class="card-desc">Quick learner & resilient</text>
  </g>
  <g class="card-group" style="transform-origin: 245.0px 57.5px;">
    <!-- Glow layer -->
    <rect x="177.5" y="20" width="135" height="75" rx="10" ry="10" fill="#00F0FF" filter="url(#soft-blur)" class="card-glow" />
    <!-- Card Body -->
    <rect x="177.5" y="20" width="135" height="75" rx="10" ry="10" fill="#0d1117" stroke="#30363d" stroke-width="1.5" class="card-main" style="stroke-hover: #00F0FF;" />
    <!-- Icon -->
    <text x="192.5" y="55" class="card-icon">🤖</text>
    <!-- Title -->
    <text x="192.5" y="72" class="card-title">Prompting</text>
    <!-- Description -->
    <text x="192.5" y="84" class="card-desc">AI system orchestration</text>
  </g>
  <g class="card-group" style="transform-origin: 400.0px 57.5px;">
    <!-- Glow layer -->
    <rect x="332.5" y="20" width="135" height="75" rx="10" ry="10" fill="#FF007F" filter="url(#soft-blur)" class="card-glow" />
    <!-- Card Body -->
    <rect x="332.5" y="20" width="135" height="75" rx="10" ry="10" fill="#0d1117" stroke="#30363d" stroke-width="1.5" class="card-main" style="stroke-hover: #FF007F;" />
    <!-- Icon -->
    <text x="347.5" y="55" class="card-icon">🎵</text>
    <!-- Title -->
    <text x="347.5" y="72" class="card-title">Vibe Coding</text>
    <!-- Description -->
    <text x="347.5" y="84" class="card-desc">Coding in flow state</text>
  </g>
  <g class="card-group" style="transform-origin: 555.0px 57.5px;">
    <!-- Glow layer -->
    <rect x="487.5" y="20" width="135" height="75" rx="10" ry="10" fill="#F39C12" filter="url(#soft-blur)" class="card-glow" />
    <!-- Card Body -->
    <rect x="487.5" y="20" width="135" height="75" rx="10" ry="10" fill="#0d1117" stroke="#30363d" stroke-width="1.5" class="card-main" style="stroke-hover: #F39C12;" />
    <!-- Icon -->
    <text x="502.5" y="55" class="card-icon">💬</text>
    <!-- Title -->
    <text x="502.5" y="72" class="card-title">Communication</text>
    <!-- Description -->
    <text x="502.5" y="84" class="card-desc">Clear team collaboration</text>
  </g>
  <g class="card-group" style="transform-origin: 710.0px 57.5px;">
    <!-- Glow layer -->
    <rect x="642.5" y="20" width="135" height="75" rx="10" ry="10" fill="#E74C3C" filter="url(#soft-blur)" class="card-glow" />
    <!-- Card Body -->
    <rect x="642.5" y="20" width="135" height="75" rx="10" ry="10" fill="#0d1117" stroke="#30363d" stroke-width="1.5" class="card-main" style="stroke-hover: #E74C3C;" />
    <!-- Icon -->
    <text x="657.5" y="55" class="card-icon">🔍</text>
    <!-- Title -->
    <text x="657.5" y="72" class="card-title">Problem Solving</text>
    <!-- Description -->
    <text x="657.5" y="84" class="card-desc">Analytical debug mindset</text>
  </g>
</svg>